   <mat-card>
    <mat-card-title>
        Product List
        <button mat-raised-button color="primary" style="float: right;" routerLink="/products/create">
          + Add Product
        </button>
      </mat-card-title>
  <mat-card-content>
    <table mat-table [dataSource]="products" class="mat-elevation-z8">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let product"> {{product.id}} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let product"> {{product.name}} </td>
      </ng-container>

      <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef> Brand </th>
        <td mat-cell *matCellDef="let product"> {{product.brand}} </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let product"> ₹{{product.price}} </td>
      </ng-container>

      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef> Stock </th>
        <td mat-cell *matCellDef="let product"> {{product.stock}} </td>
      </ng-container>
<button mat-button color="primary" [routerLink]="['/products/edit']">Edit</button>

      <tr mat-header-row *matHeaderRowDef="['id', 'name', 'brand', 'price', 'stock']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['id', 'name', 'brand', 'price', 'stock'];"></tr>
    </table>
  </mat-card-content>
</mat-card>

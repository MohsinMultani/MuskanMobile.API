<div class="container">
    <h2>Products</h2>
    <div *ngIf="products.length === 0">No products available.</div>
    <div *ngFor="let product of products" class="product-card">
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
      <p><strong>Price:</strong> ₹{{ product.price }}</p>
    </div>
  </div>
